<!DOCTYPE html>
<html>
<head>
  <title>ZOVREO Fashion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:Arial;
      background: linear-gradient(135deg, #0f172a, #020617);
      color:white;
    }

    header {
      text-align:center;
      padding:20px;
      font-size:28px;
      font-weight:bold;
      background:#020617;
      color:#14b8a6;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #14b8a6; }
      to { text-shadow: 0 0 20px #14b8a6, 0 0 30px #14b8a6; }
    }

    .banner {
      text-align:center;
      padding:30px;
      animation: fadeIn 2s ease;
    }

    @keyframes fadeIn {
      from {opacity:0; transform:translateY(20px);}
      to {opacity:1; transform:translateY(0);}
    }

    .products {
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap:15px;
      padding:15px;
    }

    .card {
      background:#1e293b;
      padding:10px;
      border-radius:12px;
      text-align:center;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow:0 0 15px #14b8a6;
    }

    img {
      width:100%;
      height:150px;
      object-fit:cover;
      border-radius:8px;
    }

    button {
      margin-top:8px;
      padding:8px;
      width:100%;
      border:none;
      border-radius:6px;
      background:#14b8a6;
      color:white;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover {
      background:#0ea5a4;
    }

    .cart {
      position:fixed;
      right:0;
      top:0;
      width:220px;
      height:100%;
      background:#020617;
      padding:10px;
      font-size:14px;
      overflow:auto;
      box-shadow:-2px 0 10px rgba(0,0,0,0.5);
    }

    .upi, .contact {
      text-align:center;
      padding:15px;
      background:#020617;
      margin-top:10px;
      animation: fadeIn 2s ease;
    }

    footer {
      text-align:center;
      padding:10px;
      background:#020617;
      margin-top:10px;
    }
  </style>
</head>

<body>

<header>ZOVREO ✨</header>

<div class="banner">
  <h2>🔥 Premium Fashion Store 🔥</h2>
  <p>Stylish • Trendy • Affordable</p>
</div>

<div class="products">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
    <h3>T-Shirt</h3>
    <p>₹499</p>
    <button onclick="addToCart('T-Shirt',499)">Add</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
    <h3>Shirt</h3>
    <p>₹799</p>
    <button onclick="addToCart('Shirt',799)">Add</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246">
    <h3>Hoodie</h3>
    <p>₹1199</p>
    <button onclick="addToCart('Hoodie',1199)">Add</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf">
    <h3>Jeans</h3>
    <p>₹1299</p>
    <button onclick="addToCart('Jeans',1299)">Add</button>
  </div>

</div>

<div class="cart">
  <h2>🛒 Cart</h2>
  <ul id="cartItems"></ul>
  <p>Total: ₹<span id="total">0</span></p>
  <button onclick="checkout()">Checkout</button>
</div>

<div class="upi">
  <h3>💳 UPI Payment</h3>
  <p>9818136424@fam</p>
</div>

<div class="contact">
  <h3>📞 Contact</h3>
  <p>9818136424</p>
</div>

<footer>
  © 2026 ZOVREO Fashion
</footer>

<script>
let total = 0;

function addToCart(name, price) {
  let li = document.createElement("li");
  li.innerText = name + " ₹" + price;
  document.getElementById("cartItems").appendChild(li);

  total += price;
  document.getElementById("total").innerText = total;
}

function checkout() {
  let phone = "919818136424";
  let message = "Order Total: ₹" + total;
  let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);
  window.open(url, "_blank");
}
</script>

</body>
</html>
