<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZOVREO</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-teal-50">

  <!-- Header -->
  <header class="bg-teal-600 text-white p-4 flex justify-between">
    <h1 class="text-2xl font-bold">ZOVREO</h1>
    <div id="cart-count">Cart: 0</div>
  </header>

  <!-- Hero -->
  <section class="relative">
    <img src="https://images.unsplash.com/photo-1445205170230-053b83016050" class="w-full h-[400px] object-cover">
    <div class="absolute inset-0 bg-black/50 flex flex-col justify-center items-center text-white">
      <h2 class="text-4xl font-bold">ZOVREO Fashion</h2>
      <p>Upgrade Your Style Today</p>
    </div>
  </section>

  <!-- Products -->
  <section class="p-8">
    <h2 class="text-3xl font-bold text-center text-teal-800 mb-6">Our Collection</h2>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="products"></div>
  </section>

  <!-- Cart -->
  <section class="bg-teal-100 p-8">
    <h2 class="text-2xl font-bold text-teal-800">Your Cart</h2>
    <div id="cart-items"></div>
    <h3 id="total" class="mt-4 font-bold"></h3>

    <div class="flex gap-4 mt-4">
      <button onclick="payUPI()" class="bg-blue-600 text-white px-6 py-2 rounded">Pay via UPI</button>
      <button onclick="orderWhatsApp()" class="bg-green-500 text-white px-6 py-2 rounded">Order on WhatsApp</button>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-teal-600 text-white text-center p-4">
    © 2026 ZOVREO
  </footer>

<script>
const products = [
  {name:"T-Shirt", price:399, img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"},
  {name:"Jacket", price:1699, img:"https://images.unsplash.com/photo-1520975916090-3105956dac38"},
  {name:"Shirt", price:599, img:"https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf"}
];

let cart = [];

function renderProducts(){
  const container = document.getElementById("products");
  products.forEach((p,i)=>{
    container.innerHTML += `
      <div class='bg-white p-4 rounded shadow'>
        <img src='${p.img}' class='w-full h-60 object-cover'>
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <button onclick='addToCart(${i})' class='bg-teal-600 text-white w-full mt-2 p-2'>Add to Cart</button>
      </div>
    `;
  });
}

function addToCart(i){
  cart.push(products[i]);
  document.getElementById("cart-count").innerText = "Cart: " + cart.length;
  renderCart();
}

function renderCart(){
  let html="";
  let total=0;
  cart.forEach(item=>{
    html += `<p>${item.name} - ₹${item.price}</p>`;
    total += item.price;
  });
  document.getElementById("cart-items").innerHTML = html;
  document.getElementById("total").innerText = "Total: ₹" + total;
}

function payUPI(){
  let total=cart.reduce((a,b)=>a+b.price,0);
  window.location.href = `upi://pay?pa=9818136424@fam&pn=ZOVREO&am=${total}&cu=INR`;
}

function orderWhatsApp(){
  let msg = "Order:%0A";
  cart.forEach(i=> msg += i.name+" ₹"+i.price+"%0A");
  window.open(`https://wa.me/919818136424?text=${msg}`);
}

renderProducts();
</script>

</body>
</html>
